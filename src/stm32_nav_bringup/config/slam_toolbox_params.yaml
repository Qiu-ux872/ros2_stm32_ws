slam_toolbox:
  ros__parameters:
    # 基础配置：是否使用仿真时间（实际机器人设为false）
    use_sim_time: false

    # 坐标系配置（需与机器人TF树一致）
    odom_frame: odom        # 里程计坐标系
    map_frame: map          # 地图坐标系
    base_frame: base_link   # 机器人基坐标系
    scan_topic: /scan       # 激光雷达话题名

    # 运行模式：mapping=建图，localization=定位
    mode: mapping
    resolution: 0.05        # 地图分辨率（0.05m/像素，平衡精度与性能）

    # 激光雷达参数（解决"minimum laser range"警告的核心项）
    min_laser_range: 0.1   # 激光最小有效距离（匹配雷达硬件能力0.1m）
    max_laser_range: 20.0   # 激光最大有效距离（根据雷达型号调整）

    # 时间间隔配置
    minimum_time_interval: 0.05    # 最小处理时间间隔（20Hz，匹配雷达频率）
    transform_publish_period: 0.05 # TF变换发布周期（20Hz）
    map_update_interval: 2.0       # 地图更新周期（2秒更新一次，降低资源占用）

    # 扫描匹配配置
    use_scan_matching: true        # 启用扫描匹配（提升建图精度）
    use_scan_barycenter: true      # 使用扫描重心（优化匹配稳定性）
    minimum_travel_distance: 0.05  # 最小移动距离（机器人移动0.05m才更新地图）
    minimum_travel_heading: 0.05   # 最小旋转角度（0.05rad≈2.86°才更新地图）
    scan_buffer_size: 30           # 扫描缓存大小（保存30帧激光数据）
    scan_buffer_maximum_scan_distance: 15.0 # 缓存中激光最大有效距离

    # 闭环检测-链路匹配配置
    link_match_minimum_response_fine: 0.1  # 精细匹配最小响应值（越高越严格）
    link_scan_maximum_distance: 2.0        # 链路扫描最大距离
    loop_search_maximum_distance: 4.0      # 闭环搜索最大距离（4m内搜索闭环）
    do_loop_closing: true                  # 启用闭环检测（消除建图累积误差）
    loop_match_minimum_chain_size: 10      # 闭环匹配最小链长度
    loop_match_maximum_variance_coarse: 3.0 # 粗匹配最大方差
    loop_match_minimum_response_coarse: 0.35 # 粗匹配最小响应值
    loop_match_minimum_response_fine: 0.45  # 精细匹配最小响应值

    # 相关性搜索空间配置
    correlation_search_space_dimension: 0.5    # 相关搜索空间维度（0.5m）
    correlation_search_space_resolution: 0.01  # 相关搜索空间分辨率（0.01m）
    correlation_search_space_smear_deviation: 0.1 # 相关搜索空间偏差

    # 闭环搜索空间配置
    loop_search_space_dimension: 8.0      # 闭环搜索空间维度（8m）
    loop_search_space_resolution: 0.05    # 闭环搜索空间分辨率（0.05m）
    loop_search_space_smear_deviation: 0.03 # 闭环搜索空间偏差

    # 惩罚项配置
    distance_variance_penalty: 0.5  # 距离方差惩罚（越大对距离偏差越敏感）
    angle_variance_penalty: 1.0     # 角度方差惩罚（越大对角度偏差越敏感）

    # 角度偏移配置
    fine_search_angle_offset: 0.00349    # 精细搜索角度偏移（0.2°）
    coarse_search_angle_offset: 0.349    # 粗搜索角度偏移（20°）
    coarse_angle_resolution: 0.0349      # 粗角度分辨率（2°）
    minimum_angle_penalty: 0.9           # 最小角度惩罚
    minimum_distance_penalty: 0.5        # 最小距离惩罚
    use_response_expansion: true         # 启用响应扩展（提升匹配鲁棒性）

