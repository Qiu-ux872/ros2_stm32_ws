amcl:
  ros__parameters:
    use_sim_time: false                          # 不使用仿真时间

    alpha1: 0.2                                  # 里程计噪声参数x方向
    alpha2: 0.2                                  # 里程计噪声参数y方向
    alpha3: 0.2                                  # 里程计噪声参数角度
    alpha4: 0.2                                  # 里程计噪声参数x-y
    alpha5: 0.2                                  # 里程计噪声参数角度漂移

    base_frame_id: "base_link"                   # 机器人基坐标系
    odom_frame_id: "odom"                        # 里程计坐标系
    global_frame_id: "map"                       # 全局地图坐标系
    scan_topic: /scan                             # 激光雷达话题

    min_particles: 300                           # 最小粒子数
    max_particles: 2000                          # 最大粒子数
    resample_interval: 1                         # 重采样间隔

    update_min_d: 0.03                           # 移动最小距离更新
    update_min_a: 0.03                           # 旋转最小角度更新

    laser_model_type: "likelihood_field"         # 激光模型类型

    # 关键修改：三全向/全向底盘必须用 OmniMotionModel
    robot_model_type: "nav2_amcl::OmniMotionModel"  # 全向底盘运动模型

    tf_broadcast: true                           # 发布TF变换
    transform_tolerance: 0.3                     # TF容忍时延
    recovery_alpha_fast: 0.0                     # 快速恢复权重
    recovery_alpha_slow: 0.0                     # 慢速恢复权重
    do_beamskip: false                           # 不跳过激光束
    beam_skip_distance: 0.5                      # 跳束距离阈值
    beam_skip_threshold: 0.3                     # 跳束概率阈值
    beam_skip_error_threshold: 0.9               # 跳束错误阈值

    max_beams: 60                                # 最大激光束数
    z_hit: 0.5                                   # 有效击中权重
    z_short: 0.05                                # 短距离噪声权重
    z_max: 0.05                                  # 最大距离噪声权重
    z_rand: 0.5                                  # 随机噪声权重
    sigma_hit: 0.2                               # 击中高斯方差
    lambda_short: 0.1                            # 短距离指数系数
    laser_likelihood_max_dist: 2.0               # 激光似然场最大距离

bt_navigator:
  ros__parameters:
    use_sim_time: false                          # 不使用仿真时间
    global_frame: map                            # 全局坐标系
    robot_base_frame: base_link                   # 机器人基坐标系
    odom_topic: /odom                             # 里程计话题
    transform_tolerance: 0.3                     # TF容忍时延

controller_server:
  ros__parameters:
    use_sim_time: false                          # 不使用仿真时间
    controller_frequency: 10.0                    # 控制器频率

    min_x_velocity_threshold: 0.001               # x方向速度阈值
    min_y_velocity_threshold: 0.001               # y方向速度阈值（全向底盘启用）
    min_theta_velocity_threshold: 0.001           # 角速度阈值

    odom_topic: /odom                             # 里程计话题

    progress_checker_plugin: "progress_checker"   # 进度检查插件
    goal_checker_plugins: ["goal_checker"]        # 目标检查插件
    controller_plugins: ["FollowPath"]            # 路径跟踪控制器

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"  # 简单进度检查
      required_movement_radius: 0.05           # 必须移动半径
      movement_time_allowance: 8.0             # 允许移动时间

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"  # 简单目标检查
      xy_goal_tolerance: 0.10                  # xy目标容忍度
      yaw_goal_tolerance: 0.15                 # 角度目标容忍度
      stateful: true                           # 有状态检查

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"       # DWB本地规划器
      debug_trajectory_details: false           # 关闭轨迹调试

      # 允许前后运动
      min_vel_x: -0.15                          # x最小速度
      max_vel_x: 0.15                           # x最大速度

      # 关键修改：允许横移
      min_vel_y: -0.15                          # y最小速度（全向底盘）
      max_vel_y: 0.15                           # y最大速度（全向底盘）

      min_vel_theta: -0.50                      # 最小角速度
      max_vel_theta: 0.50                       # 最大角速度

      min_speed_xy: 0.0                         # xy最小合速度
      max_speed_xy: 0.20                        # xy最大合速度
      min_speed_theta: 0.0                      # 最小角速度

      acc_lim_x: 0.5                            # x加速度限制
      acc_lim_y: 0.5                            # y加速度限制
      acc_lim_theta: 1.0                        # 角加速度限制

      decel_lim_x: -0.5                         # x减速度限制
      decel_lim_y: -0.5                         # y减速度限制
      decel_lim_theta: -1.0                     # 角减速度限制

      # 关键修改：全向底盘必须让 vy_samples > 1
      vx_samples: 15                            # x速度采样数
      vy_samples: 15                            # y速度采样数（全向必须>1）
      vtheta_samples: 20                        # 角速度采样数

      sim_time: 1.0                             # 仿真预测时间
      linear_granularity: 0.05                   # 线性采样粒度
      angular_granularity: 0.025                 # 角度采样粒度
      transform_tolerance: 0.3                   # TF容忍时延

      xy_goal_tolerance: 0.10                    # xy目标精度
      trans_stopped_velocity: 0.02               # 平移停止速度阈值
      short_circuit_trajectory_evaluation: true  # 快速轨迹评估
      stateful: true                             # 有状态规划

      critics:
        [
          "RotateToGoal",                        # 转向目标评价
          "Oscillation",                         # 震荡抑制评价
          "BaseObstacle",                        # 基础障碍物评价
          "GoalAlign",                           # 目标对齐评价
          "PathAlign",                           # 路径对齐评价
          "PathDist",                            # 路径距离评价
          "GoalDist"                             # 目标距离评价
        ]

      BaseObstacle.scale: 0.02                   # 障碍物评价缩放

      PathAlign.scale: 24.0                      # 路径对齐权重
      PathAlign.forward_point_distance: 0.10     # 路径对齐前向距离

      GoalAlign.scale: 18.0                      # 目标对齐权重
      GoalAlign.forward_point_distance: 0.10     # 目标对齐前向距离

      PathDist.scale: 32.0                       # 路径距离权重
      GoalDist.scale: 24.0                       # 目标距离权重

      RotateToGoal.scale: 32.0                   # 转向目标权重
      RotateToGoal.slowing_factor: 5.0           # 转向减速系数
      RotateToGoal.lookahead_time: -1.0          # 转向前瞻时间

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false                        # 不使用仿真时间
      global_frame: odom                         # 局部代价地图坐标系
      robot_base_frame: base_link                 # 机器人基坐标系

      update_frequency: 10.0                      # 更新频率
      publish_frequency: 5.0                      # 发布频率

      rolling_window: true                        # 滚动窗口
      width: 2                                  # 窗口宽度
      height: 2                                 # 窗口高度
      resolution: 0.05                            # 地图分辨率

      robot_radius: 0.06                          # 机器人半径
      transform_tolerance: 0.3                    # TF容忍时延

      plugins: ["obstacle_layer", "inflation_layer"]  # 图层插件

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"  # 障碍物图层
        enabled: true                             # 启用
        observation_sources: scan                  # 观测源：激光雷达

        scan:
          topic: /scan                             # 激光话题
          data_type: "LaserScan"                   # 消息类型
          clearing: true                           # 清除障碍物
          marking: true                            # 标记障碍物
          obstacle_max_range: 1.5                  # 障碍物最大检测距离
          raytrace_max_range: 2.0                  # 射线追踪最大距离
          max_obstacle_height: 2.0                 # 最大障碍物高度

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"  # 膨胀图层
        inflation_radius: 0.12                     # 膨胀半径
        cost_scaling_factor: 5.0                   # 代价值缩放系数

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false                        # 不使用仿真时间
      global_frame: map                           # 全局坐标系
      robot_base_frame: base_link                 # 机器人基坐标系

      update_frequency: 5.0                       # 更新频率
      publish_frequency: 2.0                      # 发布频率
      resolution: 0.05                            # 分辨率

      robot_radius: 0.06                          # 机器人半径
      track_unknown_space: true                   # 追踪未知区域
      transform_tolerance: 0.3                    # TF容忍时延

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]  # 三层地图

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"    # 静态地图层
        map_subscribe_transient_local: true        # 临时本地订阅

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"  # 障碍物层
        enabled: true                             # 启用
        observation_sources: scan                  # 观测源

        scan:
          topic: /scan                             # 激光话题
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 1.5
          raytrace_max_range: 2.0
          max_obstacle_height: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.12
        cost_scaling_factor: 5.0

map_server:
  ros__parameters:
    use_sim_time: false                          # 不使用仿真时间
    yaml_filename: ""                             # 地图文件路径

planner_server:
  ros__parameters:
    use_sim_time: false                          # 不使用仿真时间
    expected_planner_frequency: 5.0               # 全局规划频率
    planner_plugins: ["GridBased"]                # 规划器插件

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"   # 全局路径规划器
      tolerance: 0.20                             # 路径容忍度
      use_astar: true                             # 使用A*算法
      allow_unknown: true                         # 允许未知区域规划

behavior_server:
  ros__parameters:
    use_sim_time: false                          # 不使用仿真时间
    global_frame: map                             # 全局坐标系
    robot_base_frame: base_link                   # 机器人基坐标系
    costmap_topic: local_costmap/costmap_raw      # 原始代价地图话题
    footprint_topic: local_costmap/published_footprint  # 机器人轮廓话题
    cycle_frequency: 10.0                         # 行为执行频率

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]  # 行为插件

    spin:
      plugin: "nav2_behaviors/Spin"               # 原地旋转行为

    backup:
      plugin: "nav2_behaviors/BackUp"             # 后退行为

    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"     # 定向行驶行为

    wait:
      plugin: "nav2_behaviors/Wait"               # 等待行为

waypoint_follower:
  ros__parameters:
    use_sim_time: false                          # 不使用仿真时间
    stop_on_failure: true                         # 失败停止

velocity_smoother:
  ros__parameters:
    use_sim_time: false                          # 不使用仿真时间
    smoothing_frequency: 10.0                     # 速度平滑频率

    # 关键修改：允许 y 方向
    max_velocity: [0.15, 0.15, 0.5]               # 最大速度[x,y,yaw]
    min_velocity: [-0.15, -0.15, -0.5]           # 最小速度[x,y,yaw]

    max_acceleration: [0.5, 0.5, 1.0]             # 最大加速度
    max_deceleration: [-0.5, -0.5, -1.0]          # 最大减速度

    odom_topic: /odom                             # 里程计话题
    odom_duration: 0.1                           # 里程计有效时长
    deadband_velocity: [0.0, 0.0, 0.0]            # 速度死区
    velocity_timeout: 1.0                         # 速度超时时间

